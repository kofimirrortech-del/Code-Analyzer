kind = "web"
previewPath = "/"
title = "DEFFIZZY BAKE ERP"
version = "1.0.0"
id = "artifacts/deffizzy-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25290

[services.development]
run = "pnpm --filter @workspace/deffizzy-erp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/deffizzy-erp", "run", "build" ]
publicDir = "artifacts/deffizzy-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25290"
BASE_PATH = "/"
